    function buildWhatsAppLink(message) {
      return "https://wa.me/" + whatsappNumber + "?text=" + encodeURIComponent(message);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function renderProduct(product) {
      const mainImage = product.images[0];
      const galleryStrip = product.images.map((image, index) => `
        <figure>
          <div class="gallery-tile">
            <img src="${escapeHtml(image.src)}" alt="${escapeHtml(image.alt)}" loading="${index === 0 ? "eager" : "lazy"}">
          </div>
          <figcaption class="caption">${escapeHtml(image.caption || (index === 0 ? "主圖" : "細節相"))}</figcaption>
        </figure>
      `).join("");

      const details = product.details.map(([label, value]) => `
        <div class="detail-row">
          <dt>${escapeHtml(label)}</dt>
          <dd>${escapeHtml(value)}</dd>
        </div>
      `).join("");

      const tags = product.tags.map((tag) => `<span>${escapeHtml(tag)}</span>`).join("");
      const message = `你好！我想查詢「${product.name}」的現貨、尺寸和價錢。`;

      document.title = `${product.name} | Jenny's Art House 玲瓏藝舍`;
      document.querySelector("meta[name='description']").content = `${product.name}，Jenny's Art House 玲瓏藝舍商品詳情、相片、尺寸、價錢及 WhatsApp 查詢。`;
      document.getElementById("backLink").href = product.backHref;
      document.getElementById("backLink").textContent = product.backText;
      document.getElementById("topWhatsApp").href = buildWhatsAppLink(message);

      document.getElementById("main").innerHTML = `
        <section class="product-hero" aria-label="${escapeHtml(product.name)}商品詳情">
          <div class="gallery">
            <figure class="gallery-main">
              <img src="${escapeHtml(mainImage.src)}" alt="${escapeHtml(mainImage.alt)}">
            </figure>
            <div class="gallery-strip" aria-label="商品相片">${galleryStrip}</div>
          </div>

          <aside class="panel">
            <p class="eyebrow">Product Detail</p>
            <h1>${escapeHtml(product.name)}</h1>
            <p class="price">${escapeHtml(product.price)}</p>
            <p class="desc">${escapeHtml(product.intro)}</p>
            <div class="meta">${tags}</div>
            <dl class="detail-list">${details}</dl>
            <a class="whatsapp" href="${buildWhatsAppLink(message)}" target="_blank" rel="noopener">WhatsApp 查詢</a>
          </aside>
        </section>
      `;
    }

    function renderMissing() {
      document.getElementById("main").innerHTML = `
        <section class="empty-state">
          <p class="eyebrow">Product Detail</p>
          <h1>找不到此商品</h1>
          <p>可能商品連結已更新，請返回分類頁重新選擇，或直接 WhatsApp 查詢。</p>
          <a class="whatsapp" href="${buildWhatsAppLink("你好！我想查詢 Jenny's Art House 玲瓏藝舍的產品。")}" target="_blank" rel="noopener">WhatsApp 查詢</a>
        </section>
      `;
    }

    const id = new URLSearchParams(window.location.search).get("id");
    const product = products[id];
    if (product) {
      renderProduct(product);
    } else {
      renderMissing();
    }

    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
